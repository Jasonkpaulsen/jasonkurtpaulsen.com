<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jason Kurt Paulsen</title>
  <meta name="description" content="Director of Technology | AI & Digital Transformation | North America">
  <meta property="og:title" content="Jason Kurt Paulsen">
  <meta property="og:description" content="Director of Technology | AI & Digital Transformation | North America">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jasonpaulsen.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --text-primary: #f0ece4;
      --text-secondary: #9a9590;
      --accent: #c4a87c;
      --accent-dim: rgba(196,168,124,0.12);
      --rule: rgba(196,168,124,0.18);
      --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ─────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    /* ── Headshot ─────────────────────────────── */
    .headshot {
      width: 175px;
      height: 175px;
      border-radius: 50%;
      margin: 0 auto 2rem;
      overflow: hidden;
      border: 2px solid var(--rule);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .headshot img {
      width: 130%;
      height: 130%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .headshot-placeholder {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
      user-select: none;
    }

    /* ── Name & Title ────────────────────────── */
    .name {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--text-primary);
      line-height: 1.15;
    }

    .title-line {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 0.75rem;
    }

    .subtitle {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 0.6rem;
      line-height: 1.5;
    }

    /* ── Divider ──────────────────────────────── */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0.5;
    }

    /* ── Links ────────────────────────────────── */
    .links-section {
      margin-top: 0;
    }

    .section-label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--rule);
      border-bottom: none;
      text-decoration: none;
      color: var(--text-primary);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .link-item:first-child {
      border-radius: 6px 6px 0 0;
    }

    .link-item:last-child {
      border-bottom: 1px solid var(--rule);
      border-radius: 0 0 6px 6px;
    }

    .link-item:only-child {
      border-radius: 6px;
      border-bottom: 1px solid var(--rule);
    }

    .link-item:hover {
      background: var(--accent-dim);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .link-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .link-label {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .link-arrow {
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
      opacity: 0.5;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .link-item:hover .link-arrow {
      opacity: 1;
      transform: translateX(2px);
    }

    .links-group + .links-group {
      margin-top: 1.5rem;
    }

    /* ── Footer ───────────────────────────────── */
    .footer {
      margin-top: 2.5rem;
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      opacity: 0.4;
    }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem; }
      .name { font-size: 2rem; }
      .headshot { width: 120px; height: 120px; }
    }

    /* ── Subtle entrance ─────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.6s ease-out both; }
  </style>
</head>
<body>
  <main class="card">

    <!-- Headshot -->
    <div class="headshot">
      <img src="Jason%20Headshot.JPG" alt="Jason Kurt Paulsen">
    </div>

    <!-- Name & Title -->
    <h1 class="name">Jason Kurt Paulsen</h1>
    <p class="title-line">Director of Technology &middot; AI &amp; Digital Transformation &middot; North America</p>
    <p class="subtitle">Enterprise platforms, AI adoption, and digital commerce at scale</p>

    <div class="divider"></div>

    <!-- Professional -->
    <div class="links-section">
      <div class="links-group">
        <p class="section-label">Professional</p>
        <div class="links">

              <span class="link-label">LinkedIn</span>
            </span>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a class="link-item" href="bio.html">

              <span class="link-label">Bio</span>
            </span>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

        </div>

      <!-- Connect -->
      <div class="links-group">
        <p class="section-label">Connect</p>
        <div class="links">
          <a class="link-item" href="mailto:jasonkurtpaulsen@gmail.com">
            <span class="link-left">
              <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
              <span class="link-label">Email</span>
            </span>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a class="link-item" href="https://cal.com/jasonpaulsen/connect" target="_blank" rel="noopener">
            <span class="link-left">
              <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
              <span class="link-label">Book a Call</span>
            </span>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </div>

    <p class="footer">New York City</p>

  </main>
</body>
</html>
